name: Dagelijkse Beursbriefing

on:
  schedule:
    # 18:00 UTC = 20:00 CEST (UTC+2), alleen werkdagen
    - cron: '0 18 * * 1-5'
  workflow_dispatch:  # handmatige trigger voor testen

permissions:
  contents: write  # nodig voor git commit + push van email_final.html
  models: read     # nodig voor GitHub Models API (gpt-4o-mini)

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Stap 1 — Haal koersen en nieuws op
        run: python fetch_news.py

      - name: Stap 2 — Analyseer via GitHub Models en genereer email
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python analyze_and_generate.py

      - name: Commit email_final.html naar repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email_final.html
          git diff --staged --quiet || git commit -m "Auto: beursbrief $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Stap 3 — Verstuur email via Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_email.py
